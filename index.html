<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/crown.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO fundamentals -->
    <title>Queems — Daily Queens Puzzle Game</title>
    <meta name="description" content="A daily N-Queens puzzle game inspired by LinkedIn Queens. Place one queen per color region so no two queens share a row, column, or diagonal. Free to play in your browser." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://queems.netlify.app" />

    <!-- Open Graph — Facebook, WhatsApp, LinkedIn -->
    <meta property="og:title" content="Queems — Daily Queens Puzzle Game" />
    <meta property="og:description" content="Place queens on a color-coded board so no two queens share a row, column, region, or diagonal." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://queems.netlify.app" />
    <meta property="og:image" content="https://queems.netlify.app/Queems.png" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Queems puzzle board with color regions and queens" />
    <meta property="og:site_name" content="Queems" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Queems — Daily Queens Puzzle Game" />
    <meta name="twitter:description" content="Place queens on a color-coded board so no two queens share a row, column, region, or diagonal." />
    <meta name="twitter:image" content="https://queems.netlify.app/Queems.png" />
    <meta name="twitter:image:alt" content="Queems puzzle board with color regions and queens" />

    <!-- Structured Data — JSON-LD WebApplication -->
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Queems",
  "description": "Place queens on a color-coded board so no two queens share a row, column, region, or diagonal. A browser-based N-Queens puzzle game.",
  "url": "https://queems.netlify.app",
  "applicationCategory": "GameApplication",
  "image": "https://queems.netlify.app/Queems.png",
  "creator": {
    "@type": "Person",
    "name": "Ron Hachmon"
  },
  "inLanguage": "en-US",
  "isAccessibleForFree": true,
  "datePublished": "2026-02-01"
}
    </script>
    <script>
      try{var s=JSON.parse(localStorage.getItem('queems-settings')||'{}');
      if(s.state&&s.state.darkModeEnabled)document.documentElement.classList.add('dark')}catch(e){}
    </script>
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
